<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sashes-carros</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            overflow-x: hidden;
            background-color: rgb(0, 0, 0);
        }

        .container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(0, 0, 0);
        }

        #container1 {
            background-color: #000000; /* Azul */
        }

        #container2 {
            background-color: #000000; /* Verde */
        }

        #container3 {
            background-color: #000000; /* Vermelho */
        }

        #container4 {
            background-color: #000000; /* Amarelo */

        }

        #img {
                width: 100%; /* Diminuir o tamanho da imagem em resoluções móveis */
               
                
            }
            .sombra-rosa {
                box-shadow: 0 0 50px #E84DA3; /* Adiciona uma sombra rosa */
                }

 
 
        .margin-container {
            margin: 0 25%; /* Margens brancas nas laterais */
        }

        @media (max-width: 600px) {
            .margin-container {
                margin: 0 10%; /* Alterando a margem para resoluções móveis */
            }
            #img {
                width: 110%; /* Diminuir o tamanho da imagem em resoluções móveis */
                
            }

            .container {
            height: 36vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: rgb(0, 0, 0);
        }

        .sombra-rosa {
                box-shadow: 0 0 20px #E84DA3; /* Adiciona uma sombra rosa */
                }


        }

        

    </style>
</head>
<body>

   

    <div class="container margin-container" id="container1">
        
        <img id="img" class="sombra-rosa" src="img/img1.png" alt="1">
    </div>

    <div class="container margin-container" id="container2">
        <img id="img" class="sombra-rosa" src="img/img2.png" alt="2">
    </div>

    <div class="container margin-container" id="container3">
        <img id="img" class="sombra-rosa" src="img/img3.png" alt="3">
    </div>

    <div class="container margin-container" id="container4">
        <img id="img" class="sombra-rosa" src="img/img4.png" alt="4">
    </div>

</body>
</html>
